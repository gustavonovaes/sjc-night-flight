<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Gustavo Novaes <contato@gustavonovaes.dev>" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <!-- PWA / fullscreen no iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-fullscreen"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#030314" />
    <title>SJC Night Flight — Guardião do Vale</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        /* dvh cobre área real excluindo barra do browser em mobile */
        height: 100dvh;
        background: #030314;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        font-family: "Courier New", Courier, monospace;
        color: #e0e0ff;
        user-select: none;
        /* safe area para notch/ilha dinâmica */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      #wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
        width: min(100vw, calc(100dvh * 800 / 450));
        height: min(100dvh, calc(100vw * 450 / 800));
        touch-action: none;
      }
      #btn-pause-mobile {
        display: none;
        position: fixed;
        top: max(10px, env(safe-area-inset-top, 10px));
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 10, 40, 0.75);
        border: 1px solid rgba(37, 99, 235, 0.5);
        color: #60a5fa;
        font-size: 20px;
        width: 48px;
        height: 48px;
        border-radius: 10px;
        cursor: pointer;
        z-index: 999;
        line-height: 1;
      }
      #btn-special-mobile {
        display: none;
        position: fixed;
        bottom: max(14px, env(safe-area-inset-bottom, 14px));
        left: max(14px, env(safe-area-inset-left, 14px));
        background: rgba(10, 10, 40, 0.82);
        border: 1px solid rgba(52, 211, 153, 0.5);
        color: #fff;
        font-size: 24px;
        width: 56px;
        height: 56px;
        border-radius: 12px;
        cursor: pointer;
        z-index: 999;
        line-height: 1;
        align-items: center;
        justify-content: center;
        transition: opacity 0.15s, border-color 0.15s;
      }
      #btn-fullscreen {
        display: none;
        position: fixed;
        bottom: max(14px, env(safe-area-inset-bottom, 14px));
        right: max(14px, env(safe-area-inset-right, 14px));
        background: rgba(10, 10, 40, 0.82);
        border: 1px solid rgba(99, 102, 241, 0.5);
        color: #818cf8;
        font-size: 18px;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        z-index: 999;
        line-height: 1;
        align-items: center;
        justify-content: center;
      }
      @media (pointer: coarse) {
        #btn-pause-mobile {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        #btn-special-mobile {
          display: flex;
        }
        #btn-fullscreen {
          display: flex;
        }
      }
      :fullscreen body,
      :-webkit-full-screen body {
        padding: 0;
      }
    </style>
    <script type="module" crossorigin src="/sjc-night-flight/assets/index-2OAft6VI.js"></script>
  </head>
  <body>
    <div id="wrap">
      <canvas id="c"></canvas>
      <button id="btn-pause-mobile">⏸</button>
      <button id="btn-special-mobile" title="Especial">⚡</button>
      <button id="btn-fullscreen" title="Tela cheia">⛶</button>
    </div>
    <script>
      // Fullscreen: hide button when already fullscreen
      const btnFs = document.getElementById('btn-fullscreen');
      function _updateFsBtn() {
        if (!btnFs) return;
        const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        btnFs.textContent = fs ? '✕' : '⛶';
        btnFs.style.display = fs ? 'none' : '';
      }
      document.addEventListener('fullscreenchange', _updateFsBtn);
      document.addEventListener('webkitfullscreenchange', _updateFsBtn);
      if (btnFs) {
        btnFs.addEventListener('click', () => {
          const el = document.documentElement;
          if (document.fullscreenElement || document.webkitFullscreenElement) {
            (document.exitFullscreen || document.webkitExitFullscreen)?.call(document);
          } else {
            const req = el.requestFullscreen || el.webkitRequestFullscreen;
            if (req) req.call(el, { navigationUI: 'hide' }).catch(() => {});
          }
        });
      }
      // On first touch/click, request fullscreen automatically (mobile)
      function _autoFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement) return;
        if (window.matchMedia('(pointer: coarse)').matches) {
          const el = document.documentElement;
          const req = el.requestFullscreen || el.webkitRequestFullscreen;
          if (req) req.call(el, { navigationUI: 'hide' }).catch(() => {});
        }
        document.removeEventListener('touchstart', _autoFullscreen);
        document.removeEventListener('click', _autoFullscreen);
      }
      document.addEventListener('touchstart', _autoFullscreen, { once: true });
      document.addEventListener('click', _autoFullscreen, { once: true });
    </script>
  </body>
</html>
